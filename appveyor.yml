build: off
version: 4.6.3.{build}
image: Visual Studio 2013

environment:
    PYTHON_HOME: 'C:/Python34'
    SZ_EXE   :   '"C:/Program Files/7-Zip/7z.exe"'
    make : 'C:/MinGW/bin/mingw32-make.exe'

init:
  - 'systeminfo | findstr /B /C:"OS Name" /C:"OS Version"' # show Windows version
  - 'echo PYTHON_HOME=%PYTHON_HOME%'
  - '%PYTHON_HOME%/python.exe -V' # show Python version
  - '%PYTHON_HOME%/Scripts/pip.exe --version' # show pip version
  - 'set PIP_DEFAULT_TIMEOUT=180'

install:
  # pip dropped support for Python 3.4
  - '%PYTHON_HOME%/python.exe -m pip install pip==19.1.1'
  - '%PYTHON_HOME%/Scripts/pip.exe --version' # show pip version
  - ps: if (-not (Test-Path psutil-5.6.7-cp34-cp34m-win32.whl)) { Start-FileDownload "https://download.bleachbit.org/deps/psutil-5.6.7-cp34-cp34m-win32.whl" -FileName psutil-5.6.7-cp34-cp34m-win32.whl }
  - ps: $hash = (Get-FileHash psutil-5.6.7-cp34-cp34m-win32.whl -Algorithm SHA256).Hash; if ($hash -ne 'DFE4D8DA295AC722B3676F14BBA7EF80241D715CFB5FF57D6B32E86A5B7DAB5A') { throw "SHA256 mismatch=$hash" }
  - ps: if (-not (Test-Path pywin32-227-cp34-cp34m-win32.whl)) { Start-FileDownload "https://download.bleachbit.org/deps/pywin32-227-cp34-cp34m-win32.whl" -FileName pywin32-227-cp34-cp34m-win32.whl }
  - ps: $hash = (Get-FileHash pywin32-227-cp34-cp34m-win32.whl -Algorithm SHA256).Hash; if ($hash -ne '097F3BCFC79F37E4D8CD95DBFBCF178D24F83309C5756B567756322912DC06F8') { throw "SHA256 mismatch=$hash" }
  - '%PYTHON_HOME%/Scripts/pip.exe install psutil-5.6.7-cp34-cp34m-win32.whl'
  - '%PYTHON_HOME%/Scripts/pip.exe install pywin32-227-cp34-cp34m-win32.whl'
  # some dependencies must be installed before attempting to install py2exe
  - '%PYTHON_HOME%/Scripts/pip.exe install -r requirements.txt'
  - '%PYTHON_HOME%/Scripts/pip.exe install py2exe==0.10.0.2'
  - '%PYTHON_HOME%/Scripts/pip.exe list'

  - ps: if (-not (Test-Path pygi-aio.exe )) { Start-FileDownload "https://download.bleachbit.org/deps/pygi-aio-3.24.1_rev1-setup_049a323fe25432b10f7e9f543b74598d4be74a39.exe" -FileName pygi-aio.exe}
  - ps: $hash = (Get-FileHash pygi-aio.exe -Algorithm SHA256).Hash; if ($hash -ne '98f28e95f360282d7065fec2aa4790ec9bbbb85ede6914ba096b1ea02aeebd0a') { throw "SHA256 mismatch=$hash" }
  - 'pygi-aio.exe %PYTHON_HOME% GTK'

  - ps: if (-not (Test-Path upx.zip)) { Start-FileDownload "https://github.com/upx/upx/releases/download/v4.1.0/upx-4.1.0-win64.zip" -FileName upx.zip}
  - ps: $hash = (Get-FileHash upx.zip -Algorithm SHA256).Hash; if ($hash -ne '382cee168d6261a76c3b6a98b3ca2de44930bf5faa5f2dc2ced4fa3850fe8ff6') { throw "SHA256 mismatch=$hash" }
  - ps: Get-FileHash upx.zip
  - '%SZ_EXE% x upx.zip'
  - 'rename upx-4.1.0-win64 upx'
  - 'dir .\upx\'

  - ps: if (-not (Test-Path gettext.zip)) { Start-FileDownload "https://github.com/mlocati/gettext-iconv-windows/releases/download/v0.21-v1.16/gettext0.21-iconv1.16-static-32.zip" -FileName gettext.zip}
  - ps: $hash = (Get-FileHash gettext.zip -Algorithm SHA256).Hash; if ($hash -ne '73a1b64a15fff9e6a5dc980d0a69cf3a24bde51bd47091a1b3fef68827ef23a8') { throw "SHA256 mismatch=$hash" }
  - '%SZ_EXE% x gettext.zip -ogettext'

  - ps: if (-not (Test-Path sqlite.zip)) { Start-FileDownload "https://sqlite.org/2026/sqlite-dll-win-x86-3530000.zip" -FileName sqlite.zip }
  - ps: $hash = (Get-FileHash sqlite.zip -Algorithm SHA256).Hash; if ($hash -ne '35e9480735437677c70130cf0285d18bce11e12f202770e5fd3ad9078b160113') { throw "SHA256 mismatch=$hash" }
  - '%SZ_EXE% x sqlite.zip'
  - 'move /y sqlite3.dll %PYTHON_HOME%\DLLs\'
#  - ps: if (-not (Test-Path vcredist_x86.exe)) { Start-FileDownload "https://download.microsoft.com/download/5/B/C/5BC5DBB3-652D-4DCE-B14A-475AB85EEF6E/vcredist_x86.exe" -FileName vcredist_x86.exe }

  # Update from NSIS 3.03.
  - ps: if (-not (Test-Path nsis-3.12-setup.exe)) { Start-FileDownload "https://sourceforge.net/projects/nsis/files/NSIS%203/3.12/nsis-3.12-setup.exe/download" -FileName nsis-3.12-setup.exe }
  - ps: $hash = (Get-FileHash nsis-3.12-setup.exe -Algorithm SHA256).Hash; if ($hash -ne '3bc2b06253a7e4957111be152ac6a536e0c7478a706e19da814038db5d706495') { throw "SHA256 mismatch=$hash" }
  - 'nsis-3.12-setup.exe /S'

  - 'set PATH=%PATH%;%cd%\gettext\bin;C:\MinGW\bin;'
# Show version numbers of installed software.
  - 'msgunfmt -V'
  - 'strip.exe -V'
  - '"c:\Program Files (x86)\NSIS\makensis.exe" /version'

build_script:
  - ps: $env:REV8 = $env:APPVEYOR_REPO_COMMIT.Substring(0,8)
  - 'echo revision = "%REV8%" > bleachbit\Revision.py'
  - 'echo build_number = "%APPVEYOR_BUILD_NUMBER%" > bleachbit\Revision.py'
  - '%make% -C po local'
  - '%PYTHON_HOME%/python.exe -m windows.setup_py2exe'
  - 'move windows\BleachBit*.exe .'
  - 'move windows\BleachBit*.zip .'
  - ps: Get-FileHash BleachBit-*

cache:
  - pygi-aio.exe -> appveyor.yml
  - upx.zip -> appveyor.yml
  - gettext.zip -> appveyor.yml
  - sqlite.zip -> appveyor.yml

test_script:
# coveralls.io
  - '%PYTHON_HOME%/Scripts/pip.exe install python-coveralls requests[security]'
# shorten very long path because of error https://github.com/az0/bleachbit/issues/166
  - 'set PATH=c:\windows\system32;c:\windows;c:\windows\system32\wbem;c:\windows\SysWOW64\WindowsPowerShell\v1.0\'
  - '%PYTHON_HOME%/Scripts/pip.exe install mock'
  - 'SET DESTRUCTIVE_TESTS=T'
  - '%PYTHON_HOME%/Scripts/coverage.exe run --include="bleachbit/*" tests/TestAll.py'

artifacts:
  - path: BleachBit-*-setup.exe
    name: FullInstaller

  - path: BleachBit-*-setup-English.exe
    name: EnglishInstaller

  - path: BleachBit-*-portable.zip
    name: Portable

  - path: .coverage

deploy:
  - provider: S3
    access_key_id:
      secure: CrPvjz7Jvg4gwOHKxUsL0PPR4mqAjB2p15/pvFw3fCk=
    secret_access_key:
      secure: VoAH5pVyhmTK3/KRuV5WcgfkTR3k/M9QDt7UD6ewcwNfkUvMynwjAHnKCG4vR0Rx
    bucket: bleachbitci
    folder: dl/$(APPVEYOR_BUILD_VERSION)-$(APPVEYOR_REPO_BRANCH)
    artifact:
    set-public: true
    reduced_redundancy: true
