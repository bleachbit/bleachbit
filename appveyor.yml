build: off
version: 6.0.1.{build}
image: Visual Studio 2026

environment:
    PYTHON_HOME: 'c:\projects\bleachbit\vcpkg_installed\x86-windows\tools\python3'
    PYTHON_EXE: '%PYTHON_HOME%\python.exe'
    MSYS_BIN: 'C:\msys64\usr\bin'
    SZ_EXE   :   '"C:/Program Files/7-Zip/7z.exe"'
    make : '%MSYS_BIN%\make.exe'

init:
  - ps: Write-Host ("`n=== {0:HH:mm:ss} ENVIRONMENT INFO ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - 'echo APPVEYOR_BUILD_WORKER_IMAGE=%APPVEYOR_BUILD_WORKER_IMAGE%'
  - 'echo APPVEYOR_BUILD_FOLDER=%APPVEYOR_BUILD_FOLDER%'
  - 'echo CD=%CD%'
  - 'systeminfo | findstr /B /C:"OS Name" /C:"OS Version"' # show Windows version
  - ps: |
      Get-WmiObject Win32_Process | Select-Object ProcessName, @{Name="UserName";Expression={$_.GetOwner().User}} | Sort-Object ProcessName, UserName -Unique | Format-Table -AutoSize
  # kill unneeded processes
  - ps: |
      $targetProcesses = @('SearchUI.exe', 'updater.exe', 'TiWorker.exe', 'TrustedInstaller.exe', 'MicrosoftEdgeUpdate.exe', 'ShellExperienceHost.exe')
      Get-WmiObject Win32_Process |
        Where-Object { $_.ProcessName -in $targetProcesses } |
        ForEach-Object {
          $result = $_.Terminate()
          $status = if ($result -and $result.ReturnValue -eq 0) {
            'terminated'
          } elseif ($result) {
            "failed ($($result.ReturnValue))"
          } else {
            'unknown'
          }
          Write-Output ("{0}: {1}" -f $_.ProcessName, $status)
        }

install:
  - cmd: call "C:\Program Files\Microsoft Visual Studio\18\Community\VC\Auxiliary\Build\vcvarsall.bat" x86
  - # The Visual Studio 2013 image had msys, but Visual Studio 2022 image does not.
  #- ps: '& "$env:APPVEYOR_BUILD_FOLDER\windows\msys-install.ps1"'
  # This script modifies PATH and prints it to the log.
  - ps: '& "$env:APPVEYOR_BUILD_FOLDER\windows\python-gtk3-install.ps1"'
  - ps: if (-not (Test-Path upx.zip)) { Start-FileDownload "https://github.com/upx/upx/releases/download/v5.1.1/upx-5.1.1-win64.zip" -FileName upx.zip}
  - ps: $hash = (Get-FileHash upx.zip -Algorithm SHA256).Hash; if ($hash -ne 'fa5380bca4c2718547aaa0134bc0d8a7fa27e102f0ac6371573d60d1c21d64de') { throw "SHA256 mismatch=$hash" }
  - '%SZ_EXE% x upx.zip'
  - 'rename upx-5.1.1-win64 upx'
  - 'dir .\upx\'
  # Update NSIS from 3.03 to 3.12.
  - ps: if (-not (Test-Path nsis-3.12-setup.exe)) { Start-FileDownload "https://sourceforge.net/projects/nsis/files/NSIS%203/3.12/nsis-3.12-setup.exe/download" -FileName nsis-3.12-setup.exe }
  - ps: $hash = (Get-FileHash nsis-3.12-setup.exe -Algorithm SHA256).Hash; if ($hash -ne '3bc2b06253a7e4957111be152ac6a536e0c7478a706e19da814038db5d706495') { throw "SHA256 mismatch=$hash" }
  - 'nsis-3.12-setup.exe /S'
  - 'choco.exe install psexec -y'

# Show version numbers of installed software.
# This also checks that the software is installed.
before_build:
  - ps: Write-Host ("`n=== {0:HH:mm:ss} SOFTWARE VERSIONS ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - 'git.exe --version'
  - '%PYTHON_EXE% -V'
  - '%make% -v'
  - '%MSYS_BIN%\msgunfmt.exe -V'
  - '%MSYS_BIN%\xgettext.exe -V'
  - '%MSYS_BIN%\strip.exe -V'
  - 'appveyor.exe version'
  - '"c:\Program Files (x86)\NSIS\makensis.exe" /version'
  - 'choco.exe --version'

build_script:
  - ps: $env:REV8 = $env:APPVEYOR_REPO_COMMIT.Substring(0,8)
  - 'echo revision = "%REV8%" > bleachbit\Revision.py'
  - 'echo build_number = "%APPVEYOR_BUILD_NUMBER%" >> bleachbit\Revision.py'
  - 'set PATH=%MSYS_BIN%;%PATH%'
  - ps: Write-Host ("`n=== {0:HH:mm:ss} MAKING I18N/L10N FILES ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - '%make% PYTHON=%PYTHON_EXE% -C po local bleachbit.pot'
  - ps: Write-Host ("`n=== {0:HH:mm:ss} BUILDING EXE AND ZIP ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - '%PYTHON_EXE% -m windows.setup'
  - 'move windows\BleachBit*.exe .'
  - 'move windows\BleachBit*.zip .'
  - ps: Get-FileHash BleachBit-*

cache:
  - gtk3.24-x86-windows.zip -> appveyor.yml, windows/python-gtk3-deps.lst, windows/python-gtk3-install.ps1

test_script:
# coveralls.io
  - '%PYTHON_HOME%\Scripts\pip3.exe install python-coveralls requests[security]'
# shorten very long path because of error https://github.com/az0/bleachbit/issues/166
  - 'set PATH=C:\ProgramData\chocolatey\bin;c:\windows\system32;c:\windows;c:\windows\system32\wbem;c:\windows\SysWOW64\WindowsPowerShell\v1.0\'
  - 'SET DESTRUCTIVE_TESTS=T'
# Catch warnings as errors. Also set in `tests/common.py`.
  - 'SET PYTHONWARNINGS=error'
  - ps: Write-Host ("`n=== {0:HH:mm:ss} ADMIN TESTS ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - 'SET COVERAGE_FILE=.coverage.admin'
  - '%PYTHON_EXE% -m coverage run -m tests.TestAll'

  # Medium Integrity non-admin user: registry, recycle bin, and related tests
  - ps: Write-Host ("`n=== {0:HH:mm:ss} NON-ADMIN TESTS ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - '%APPVEYOR_BUILD_FOLDER%\windows\run-psexec-nonadmin-tests.bat'
  # .coverage.nonadmin is already written in the repo root; no copy needed

  # Low Integrity (-l): non-admin code paths that do not need recycle bin/registry
  - ps: Write-Host ("`n=== {0:HH:mm:ss} LOW-INTEGRITY TESTS ===`n" -f (Get-Date)) -ForegroundColor Cyan
  - '%APPVEYOR_BUILD_FOLDER%\windows\run-psexec-low-integrity-tests.bat'
  - 'copy /Y %USERPROFILE%\AppData\LocalLow\.coverage.psexec .coverage.psexec'

  - 'dir .coverage*' # This should show three files to combine.
  - ps: Remove-Item Env:COVERAGE_FILE -ErrorAction SilentlyContinue
  # `combine` should report report "Combined 3 files"
  - '%PYTHON_HOME%\Scripts\coverage.exe combine --data-file=.coverage .coverage.admin .coverage.nonadmin .coverage.psexec'
  # `combine` should remove the three input files.
  - 'dir .coverage*'
  - '%PYTHON_HOME%\Scripts\coverage.exe report --data-file=.coverage'


artifacts:
  - path: BleachBit-*-setup.exe
    name: FullInstaller

  - path: BleachBit-*-setup-English.exe
    name: EnglishInstaller

  - path: BleachBit-*-portable.zip
    name: Portable

  - path: .coverage

deploy:
  - provider: S3
    access_key_id:
      secure: CrPvjz7Jvg4gwOHKxUsL0PPR4mqAjB2p15/pvFw3fCk=
    secret_access_key:
      secure: VoAH5pVyhmTK3/KRuV5WcgfkTR3k/M9QDt7UD6ewcwNfkUvMynwjAHnKCG4vR0Rx
    bucket: bleachbitci
    folder: dl/$(APPVEYOR_BUILD_VERSION)-$(APPVEYOR_REPO_BRANCH)
    artifact:
    set-public: true
    reduced_redundancy: true
