build: off
version: 6.0.0.{build}
image: Visual Studio 2022

# ---------------------------------------------------------------------------
# BleachBit TUI — 64-bit Windows build
#
# Unlike the GTK build, this uses native 64-bit Python (no 32-bit PyGTK
# constraint).  No GTK, PyGObject, or special Python distributions needed.
# ---------------------------------------------------------------------------

environment:
    # AppVeyor preinstalled Python (x64)
    # https://www.appveyor.com/docs/windows-images-software/
    PYTHON_HOME: 'C:\Python313-x64'
    PYTHON_EXE: '%PYTHON_HOME%\python.exe'
    MSYS_BIN: 'C:\msys64\usr\bin'
    SZ_EXE   :   '"C:/Program Files/7-Zip/7z.exe"'
    make : '%MSYS_BIN%\make.exe'
    BLEACHBIT_SKIP_GTK_TESTS : '1'


init:
  - 'systeminfo | findstr /B /C:"OS Name" /C:"OS Version"' # show Windows version
  - 'echo PYTHON_HOME=%PYTHON_HOME%'
  # kill unneeded processes to free CPU
  - ps: |
      $targetProcesses = @('SearchUI.exe', 'updater.exe', 'TiWorker.exe', 'TrustedInstaller.exe', 'MicrosoftEdgeUpdate.exe', 'ShellExperienceHost.exe')
      Get-WmiObject Win32_Process |
        Where-Object { $_.ProcessName -in $targetProcesses } |
        ForEach-Object {
          $result = $_.Terminate()
          $status = if ($result -and $result.ReturnValue -eq 0) {
            'terminated'
          } elseif ($result) {
            "failed ($($result.ReturnValue))"
          } else {
            'unknown'
          }
          Write-Output ("{0}: {1}" -f $_.ProcessName, $status)
        }

install:
  # Show version numbers of installed software (also verifies they exist)
  - '%make% -v'
  - '%MSYS_BIN%\msgunfmt.exe -V'
  - '%MSYS_BIN%\strip.exe -V'
  - '%PYTHON_EXE% -V'
  - '%PYTHON_EXE% -m pip install --upgrade pip'
  - '%PYTHON_EXE% -m pip install -r windows/requirements_tui.txt'
  - '%PYTHON_EXE% -m pip install pytest-xdist'
  - '%PYTHON_EXE% -m pip list'
  # Verify key packages
  - '%PYTHON_EXE% -c "import textual; print(\"textual\", textual.__version__)"'
  - '%PYTHON_EXE% -c "import win32file; print(\"win32file ok\")"'
  # with 32-bit Python, UPX 4.0.1 worked, but UPX 4.0.2, 4.1.0, and 4.2.3
  # caused ModuleNotFoundError during build
  - ps: if (-not (Test-Path upx.zip)) { Start-FileDownload "https://github.com/upx/upx/releases/download/v4.0.1/upx-4.0.1-win64.zip" -FileName upx.zip}
  - ps: Get-FileHash upx.zip
  - '%SZ_EXE% x upx.zip'
  - 'rename upx-4.0.1-win64 upx'
  - 'dir .\upx\'
  # Update NSIS to 3.12.
  - ps: if (-not (Test-Path nsis-3.12-setup.exe)) { Start-FileDownload "https://sourceforge.net/projects/nsis/files/NSIS%203/3.12/nsis-3.12-setup.exe/download" -FileName nsis-3.12-setup.exe }
  - ps: $hash = (Get-FileHash nsis-3.12-setup.exe -Algorithm SHA256).Hash; if ($hash -ne '3bc2b06253a7e4957111be152ac6a536e0c7478a706e19da814038db5d706495') { throw "SHA256 mismatch=$hash" }
  - 'nsis-3.12-setup.exe /S'
  - '"c:\Program Files (x86)\NSIS\makensis.exe" /version'

test_script:
  # Delete GTK-dependent test files (doesn't change git repo)
  - ps: Remove-Item -Force tests\TestGUI.py, tests\TestGtkShim.py, tests\TestGuiChaff.py, tests\TestGuiStartup.py, tests\TestUnix.py -ErrorAction SilentlyContinue
  # Run tests with pytest-xdist for parallel execution
  # AppVeyor has 2 CPUs https://www.appveyor.com/docs/build-environment/#build-vm-configurations
  - '%PYTHON_EXE% -m pytest -n 2 -sv tests/'

build_script:
  - ps: $env:REV8 = $env:APPVEYOR_REPO_COMMIT.Substring(0,8)
  - 'echo revision = "%REV8%" > bleachbit\Revision.py'
  - 'echo build_number = "%APPVEYOR_BUILD_NUMBER%" >> bleachbit\Revision.py'
  - 'set PATH=%MSYS_BIN%;%PATH%'
  - '%make% PYTHON=%PYTHON_EXE% -C po local bleachbit.pot'
  # Build TUI executable and packages
  - '%PYTHON_EXE% -m windows.setup_tui'
  # Sanity check: run the built executable to verify it works
  - 'dist\bleachbit_tui.exe --sysinfo'
  - 'move windows\BleachBit-TUI-*.exe .'
  - ps: Get-FileHash BleachBit-TUI-*

artifacts:
  - path: BleachBit-TUI-*-setup.exe
    name: Installer

  - path: BleachBit-TUI-*-portable.zip
    name: Portable

deploy:
  - provider: S3
    access_key_id:
      secure: CrPvjz7Jvg4gwOHKxUsL0PPR4mqAjB2p15/pvFw3fCk=
    secret_access_key:
      secure: VoAH5pVyhmTK3/KRuV5WcgfkTR3k/M9QDt7UD6ewcwNfkUvMynwjAHnKCG4vR0Rx
    bucket: bleachbitci
    folder: dl/$(APPVEYOR_BUILD_VERSION)-$(APPVEYOR_REPO_BRANCH)
    artifact:
    set-public: true
    reduced_redundancy: true
