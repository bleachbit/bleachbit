name: Run tests on Linux

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'bleachbit.spec'
      - 'debian/**'
      - 'doc/**'
      - 'po/**'
      - 'README.md'
      - 'windows/**'
  pull_request:  # Run on all pull requests
    paths-ignore:
      - 'bleachbit.spec'
      - 'debian/**'
      - 'doc/**'
      - 'po/**'
      - 'README.md'
      - 'windows/**'

# 2025-05-01: ubuntu-latest is currently 24.04, and its native
# python version is 3.12.
# native python for 22.04 is 3.10.
jobs:
  test:
    timeout-minutes: 25
    strategy:
      matrix:
        python-version: ['3.9', '3.13', '3.14']
        include:
          - python-version: '3.9'
            ubuntu-version: ubuntu-22.04
            python-extra-dep: ''
            pygobject-version: '<3.51.0'
            test_timeout_minutes: 20
            # wxPython has no manylinux wheels on PyPI; use the pre-built
            # wheels from the wxPython extras index for the matching Ubuntu
            # version so tests.TestGUIwx runs on Linux too.  4.2.4 is the
            # newest release with a cp39 Linux wheel.
            wx-extras-url: 'https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-22.04'
            wx-version: '4.2.4'
          - python-version: '3.13'
            ubuntu-version: ubuntu-latest
            python-extra-dep: 'libgirepository-2.0-dev'
            pygobject-version: ''
            test_timeout_minutes: 6
            wx-extras-url: 'https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04'
            wx-version: '4.2.5'
          - python-version: '3.14'
            ubuntu-version: ubuntu-latest
            python-extra-dep: 'libgirepository-2.0-dev'
            pygobject-version: ''
            test_timeout_minutes: 6
            wx-extras-url: 'https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04'
            wx-version: '4.2.5'

    runs-on: ${{ matrix.ubuntu-version }}

    env:
      COVERAGE: "coverage run --include='bleachbit/*'"

    steps:
    - uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          appstream \
          dbus \
          dbus-x11 \
          gettext \
          gir1.2-gtk-3.0 \
          gir1.2-notify-0.7 \
          gnome-keyring \
          libcairo2-dev \
          libgirepository1.0-dev \
          libnotify-bin \
          libsdl2-2.0-0 \
          libxml2-utils \
          notification-daemon \
          xvfb \
          ${{ matrix.python-extra-dep }}
        # for tests.TestLanguage
        sudo locale-gen es_ES.UTF-8
        sudo locale-gen pl_PL.UTF-8
        sudo locale-gen en_AU.UTF-8
        sudo update-locale

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Update Python packages
      run: |
        pip list
        python -m pip install --upgrade pip

    - name: Install Python dependencies
      run: |
        pip install coverage coveralls appveyor-artifacts -r requirements.txt
        if [ "${{ matrix.pygobject-version }}" != "" ]; then
          pip install "PyGObject${{ matrix.pygobject-version }}"
        fi
        if [ "${{ matrix.python-version }}" == "3.14" ]; then
          pip install pytest pytest-xdist
        fi

    - name: Install wxPython (for wx GUI tests)
      if: matrix.wx-extras-url != ''
      run: |
        # wxPython has no manylinux wheels on PyPI.  The wxPython project
        # publishes pre-built linux_x86_64 wheels on an extras index keyed
        # by Ubuntu version.  These bundle the wxWidgets shared libraries
        # and link against the system GTK 3 runtime (already installed via
        # gir1.2-gtk-3.0 above).
        pip install -f ${{ matrix.wx-extras-url }} wxPython==${{ matrix.wx-version }}
        python -c "import wx; print('wxPython', wx.version())"

    - name: Generate Revision.py
      run: |
        echo "revision = \"`git rev-parse --short HEAD`\"" > bleachbit/Revision.py
        echo "build_number = \"${{ github.run_number }}\"" >> bleachbit/Revision.py

    - name: Generate translations
      run: make -C po local bleachbit.pot

    - name: Run tests (regular and sudo)
      timeout-minutes: ${{ matrix.test_timeout_minutes }}
      run: |
        export DISPLAY=":1.0"
        export $(dbus-launch)
        sudo Xvfb :1 -screen 0 800x600x24 &
        sleep 5
        if [ "${{ matrix.python-version }}" == "3.14" ]; then
          dbus-run-session -- bash -c '/usr/lib/notification-daemon/notification-daemon & sleep 2 && xvfb-run -a bash -c "PYTHONPATH=. pytest -n auto"'
        else
          dbus-run-session -- bash -c '/usr/lib/notification-daemon/notification-daemon & sleep 2 && xvfb-run -a bash -c "make tests && make tests-with-sudo"'
        fi

    # appveyor-artifacts does not work with Python 3.13, and running once
    # is enough.
    - name: Combine Linux and Windows coverage, upload to Coveralls
      if: matrix.python-version == '3.9'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Linux-only coverage before combine:"
        coverage report
        mv .coverage .coverage.ubuntu
        appveyor-artifacts -o az0 -n bleachbit -m -c ${{ github.sha }} download
        mv .coverage .coverage.windows
        echo "Combined coverage:"
        coverage combine
        coverage report
        coveralls
