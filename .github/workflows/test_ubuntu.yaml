name: Run tests on Linux

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'po/*.po'
  pull_request:  # Run on all pull requests

jobs:
  test:
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.13']
        include:
          - python-version: '3.8'
            ubuntu-version: ubuntu-20.04
          - python-version: '3.10'
            ubuntu-version: ubuntu-22.04
          - python-version: '3.13'
            ubuntu-version: ubuntu-24.04

    runs-on: ${{ matrix.ubuntu-version }}

    steps:
    - uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          dbus \
          dbus-x11 \
          gettext \
          gir1.2-gtk-3.0 \
          gir1.2-notify-0.7 \
          libcairo2-dev \
          libgirepository1.0-dev \
          libxml2-utils \
          notification-daemon \
          xvfb

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Update pip
      run: python -m pip install --upgrade pip

    - name: Install Python dependencies
      run: |
        pip install PyGObject chardet
        pip install coveralls requests[security]
        pip install mock

    - name: Generate Revision.py
      run: |
        echo "revision = \"`git rev-parse --short HEAD`\"" > bleachbit/Revision.py
        echo "build_number = \"${{ github.run_number }}\"" >> bleachbit/Revision.py

    - name: Generate translations
      run: make -C po local

    - name: Run tests
      run: |
        # Start D-Bus and notification daemon
        export $(dbus-launch)
        dbus-run-session /usr/lib/notification-daemon/notification-daemon &
        sleep 2  # Give some time for the daemon to start
        xvfb-run make tests COVERAGE="coverage run --include='bleachbit/*'"

    - name: Process coverage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        mv .coverage .coverage.github
        pip install appveyor-artifacts
        appveyor-artifacts -o az0 -n bleachbit -m -c ${{ github.sha }} download
        coverage combine
        coverage report
        coveralls --service=github
