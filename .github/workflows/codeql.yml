name: CodeQL

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    paths-ignore:
      - 'appveyor.yml'
      - 'bleachbit.png'
      - 'bleachbit.spec'
      - 'COPYING'
      - 'debian/**'
      - 'doc/**'
      - 'docker/**'
      - 'MANIFEST.in'
      - 'org.bleachbit.BleachBit.desktop'
      - 'org.bleachbit.BleachBit.metainfo.xml'
      - 'org.bleachbit.policy'
      - 'po/**'
      - 'README.md'
  pull_request:
    branches:
      - '**'
      - '!dependabot/**'
    paths-ignore:
      - 'appveyor.yml'
      - 'bleachbit.png'
      - 'bleachbit.spec'
      - 'COPYING'
      - 'debian/**'
      - 'doc/**'
      - 'docker/**'
      - 'MANIFEST.in'
      - 'org.bleachbit.BleachBit.desktop'
      - 'org.bleachbit.BleachBit.metainfo.xml'
      - 'org.bleachbit.policy'
      - 'po/**'
      - 'README.md'
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write # upload results to code scanning
      packages: read # fetch internal/private CodeQL packs
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config: |
            queries:
              - uses: security-and-quality
            query-filters:
              - exclude:
                  problem.severity:
                    - recommendation

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:${{ matrix.language }}
